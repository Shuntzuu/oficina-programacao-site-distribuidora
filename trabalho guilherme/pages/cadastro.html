<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Distribuidora Luçao</title>
    <!-- Link para o CSS unificado -->
    <link rel="stylesheet" href="..//Meu projeto/style.css">
    <link href="https://cloudflare.com" rel="stylesheet">
</head>
<body class="bg-form">
    <header>
        <nav class="container">
            <div class="logo">
                <i class="fas fa-truck-loading"></i> Luçao<span>Dist</span>
            </div>
            <ul class="nav-links">
                <li><a href="../Meu projeto/index.html">Home</a></li>
                <li><a href="../pages/produto.html">Catálogo</a></li>
                <li><a href="../pages/cadastro.html" class="active">Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <main class="container section-padding flex-center">
        <div class="form-card">
            <div class="form-header">
                <i class="fas fa-user-plus icon-form"></i>
                <h2>Crie sua Conta</h2>
                <p>Preencha os dados abaixo para acessar nosso sistema.</p>
            </div>

            <!-- Requisito 4.4: Formulário com Nome, E-mail e Senha -->
            <form action="#">
                <div class="input-group">
                    <label for="nome"><i class="fas fa-user"></i> Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> E-mail Corporativo</label>
                    <input type="email" id="email" placeholder="exemplo@empresa.com" required>
                </div>

                <div class="input-group">
                    <label for="senha"><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                </div>

                <div class="form-footer">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        Aceito os termos de distribuição.
                    </label>
                </div>

                <button type="submit" class="cta-button full-width">Cadastrar Agora</button>
            </form>
            
            <p class="login-link">Já tem uma conta? <a href="../index.html">Faça login</a></p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Distribuidora Luçao | Projeto Unialfa</p>
    </footer>
</body>
</html>
